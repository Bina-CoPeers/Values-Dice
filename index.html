<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoPeers Values Dice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cyan: #00B2CA;
    --cyan-light: #e6f7fa;
    --cyan-mid: #b3e9f2;
    --green: #6CC04A;
    --charcoal: #2D2D2D;
    --mid: #5a5a5a;
    --light: #f4f8f9;
    --white: #ffffff;
    --radius: 16px;
    --radius-sm: 10px;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--light);
    color: var(--charcoal);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    background: var(--white);
    padding: 30px 24px 26px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    position: relative;
    box-shadow: 0 1px 0 rgba(45,45,45,0.06);
  }

  /* thin gradient hairline echoing the two figures in the logo */
  header::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--cyan) 0%, var(--green) 100%);
  }

  .logo-img {
    width: 178px;
    max-width: 64%;
    height: auto;
    display: block;
  }

  .title-row {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-top: 16px;
  }

  .title-row .pip {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .title-row .pip.cyan { background: var(--cyan); }
  .title-row .pip.green { background: var(--green); }

  header h1 {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--charcoal);
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }

  header p {
    font-size: 0.82rem;
    color: var(--mid);
    text-align: center;
    max-width: 340px;
    margin-top: 10px;
    line-height: 1.5;
  }

  main {
    width: 100%;
    max-width: 480px;
    padding: 28px 20px 48px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .dice-area {
    display: flex;
    gap: 16px;
    justify-content: center;
  }

  .die {
    width: 110px;
    height: 110px;
    background: var(--white);
    border-radius: var(--radius);
    border: 2px solid var(--cyan-mid);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    box-shadow: 0 2px 12px rgba(0,178,202,0.10);
  }

  .die.rolling {
    animation: shake 0.45s ease;
  }

  @keyframes shake {
    0%   { transform: translate(0,0) rotate(0deg); }
    20%  { transform: translate(-4px,-3px) rotate(-6deg); }
    40%  { transform: translate(4px,3px) rotate(6deg); }
    60%  { transform: translate(-3px,2px) rotate(-4deg); }
    80%  { transform: translate(3px,-2px) rotate(4deg); }
    100% { transform: translate(0,0) rotate(0deg); }
  }

  .die-value {
    font-size: 2.6rem;
    font-weight: 700;
    color: var(--cyan);
    line-height: 1;
  }

  .die-label {
    font-size: 0.65rem;
    font-weight: 600;
    color: var(--mid);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .roll-btn {
    width: 100%;
    padding: 16px;
    background: var(--cyan);
    color: var(--white);
    border: none;
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .roll-btn:hover { background: #009db3; }
  .roll-btn:active { transform: scale(0.98); }

  .prompt-card {
    background: var(--white);
    border-radius: var(--radius);
    border: 2px solid var(--cyan-mid);
    padding: 26px 22px;
    box-shadow: 0 2px 12px rgba(0,178,202,0.08);
    display: none;
    flex-direction: column;
    gap: 14px;
  }

  .prompt-card.visible { display: flex; }

  .prompt-type-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    width: fit-content;
  }

  .badge-values {
    background: var(--cyan-light);
    color: var(--cyan);
  }

  .badge-choice {
    background: #edf8e8;
    color: #4a9934;
  }

  .prompt-text {
    font-size: 1.1rem;
    line-height: 1.6;
    font-weight: 500;
    color: var(--charcoal);
  }

  .manual-section {
    border-top: 1px solid var(--cyan-mid);
    padding-top: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .manual-label {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--mid);
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .manual-inputs {
    display: flex;
    gap: 10px;
  }

  .manual-input {
    flex: 1;
    padding: 11px 14px;
    border: 2px solid var(--cyan-mid);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 1rem;
    font-weight: 600;
    color: var(--charcoal);
    text-align: center;
    text-transform: uppercase;
    background: var(--white);
    outline: none;
    transition: border-color 0.15s;
  }

  .manual-input:focus { border-color: var(--cyan); }
  .manual-input::placeholder { color: #bbb; font-weight: 400; }

  .lookup-btn {
    padding: 11px 20px;
    background: var(--charcoal);
    color: var(--white);
    border: none;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .lookup-btn:hover { background: #444; }

  .error-msg {
    font-size: 0.8rem;
    color: #c0392b;
    text-align: center;
    display: none;
  }

  .error-msg.visible { display: block; }

  footer {
    margin-top: auto;
    padding: 18px;
    text-align: center;
    font-size: 0.72rem;
    color: #aaa;
  }
</style>
</head>

    <span class="pip cyan"></span>
    <h1>Values Dice</h1>
    <span class="pip green"></span>
  </div>
  <p>Roll to find a prompt. Use it to open a conversation about what matters.</p>
</header>

<main>

  <div class="dice-area">
    <div class="die" id="die-letter">
      <span class="die-value" id="val-letter">?</span>
      <span class="die-label">Letter (A to K)</span>
    </div>
    <div class="die" id="die-number">
      <span class="die-value" id="val-number">?</span>
      <span class="die-label">Number (1 to 5)</span>
    </div>
  </div>

  <button class="roll-btn" id="roll-btn" onclick="rollDice()">Roll for Me</button>

  <div class="prompt-card" id="prompt-card">
    <span class="prompt-type-badge" id="prompt-badge"></span>
    <p class="prompt-text" id="prompt-text"></p>
  </div>

  <div class="manual-section">
    <span class="manual-label">Using physical dice? Enter your roll</span>
    <div class="manual-inputs">
      <input class="manual-input" id="input-letter" maxlength="1" placeholder="A" type="text">
      <input class="manual-input" id="input-number" maxlength="1" placeholder="1" type="text">
      <button class="lookup-btn" onclick="lookupManual()">Find Prompt</button>
    </div>
    <p class="error-msg" id="error-msg">Try a letter A through K and a number 1 through 5.</p>
  </div>

</main>

<footer>CoPeers &bull; Member Engagement</footer>

<script>
const prompts = {

  A5: { type: "choice", text: "Name a moment this week you almost skipped but didn't. What pushed you?" },

  B4: { type: "choice", text: "When did you last feel left out? What did you do with that feeling?" },
  B5: { type: "values", text: "Who could you call at three in the morning, no questions asked?" },

  F5: { type: "values", text: "What do you hope people remember about you?" },

  G2: { type: "choice", text: "When did you make the same mistake twice? What finally clicked the second time?" },
  G3: { type: "values", text: "What do you believe about yourself now that you didn't five years ago?" },
  G4: { type: "choice", text: "What have you been avoiding that you know you need to face?" },
  G5: { type: "values", text: "Who taught you something that still sticks with you? What was it?" },

  H1: { type: "values", text: "What do people come to you for?" },
  H2: { type: "choice", text: "What strength of yours have you been leaving on the shelf lately?" },
  H3: { type: "values", text: "What are you good at that nobody ever formally taught you?" },
  H4: { type: "values", text: "What do people thank you for that you don't even notice you're doing?" },
  H5: { type: "choice", text: "When are you most useful to the people around you?" },

  I1: { type: "values", text: "What story does your mind tell you on a bad day? How long have you been hearing it?" },
  I2: { type: "choice", text: "If your worries had a volume knob, where's it set right now?" },
  I3: { type: "values", text: "If you spoke to a friend the way you speak to yourself, would they stick around?" },
  I4: { type: "choice", text: "What feeling do you spend the most energy trying to avoid?" },
  I5: { type: "values", text: "What's something you've made peace with that your younger self swore you never would?" },

};

const letters = 'ABCDEFGHIJK'.split('');
const numbers = [1,2,3,4,5];

function showPrompt(key) {
  const p = prompts[key];
  if (!p) return false;
  const card = document.getElementById('prompt-card');
  const badge = document.getElementById('prompt-badge');
  badge.textContent = p.type === 'values' ? 'Values' : 'Choice Point';
  badge.className = 'prompt-type-badge ' + (p.type === 'values' ? 'badge-values' : 'badge-choice');
  document.getElementById('prompt-text').textContent = p.text;
  card.classList.add('visible');
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  return true;
}

function rollDice() {
  const letter = letters[Math.floor(Math.random() * letters.length)];
  const number = numbers[Math.floor(Math.random() * numbers.length)];

  const dL = document.getElementById('die-letter');
  const dN = document.getElementById('die-number');
  dL.classList.remove('rolling');
  dN.classList.remove('rolling');
  void dL.offsetWidth;
  dL.classList.add('rolling');
  dN.classList.add('rolling');

  document.getElementById('val-letter').textContent = letter;
  document.getElementById('val-number').textContent = number;
  showPrompt(letter + number);
}

function lookupManual() {
  const l = document.getElementById('input-letter').value.trim().toUpperCase();
  const n = document.getElementById('input-number').value.trim();
  const err = document.getElementById('error-msg');
  const key = l + n;
  if (prompts[key]) {
    document.getElementById('val-letter').textContent = l;
    document.getElementById('val-number').textContent = n;
    err.classList.remove('visible');
    showPrompt(key);
  } else {
    err.classList.add('visible');
  }
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('input-letter').addEventListener('keydown', e => { if (e.key === 'Enter') lookupManual(); });
  document.getElementById('input-number').addEventListener('keydown', e => { if (e.key === 'Enter') lookupManual(); });
});
</script>
